name: release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to be released (e.g., 1.0.0)"
        type: string
        required: true

permissions: {}

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
          else
            RAW_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=${RAW_VERSION#v}" >> $GITHUB_OUTPUT

  draft-release:
    runs-on: ubuntu-24.04
    needs: version
    permissions:
      contents: write
    steps:
      - name: Check for existing release
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: v${{ needs.version.outputs.version }}
        run: |
          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        if: steps.check-release.outputs.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: v${{ needs.version.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "$VERSION" \
            --draft

      - name: Reset to draft
        if: steps.check-release.outputs.EXISTS == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: v${{ needs.version.outputs.version }}
        run: |
          gh release edit "$VERSION" \
            --repo "${{ github.repository }}" \
            --draft

  build-and-release:
    runs-on: ${{ matrix.runner }}
    needs: [version, draft-release]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, runner: ubuntu-24.04 }
          - { goos: linux, goarch: arm64, runner: ubuntu-24.04 }
          - { goos: darwin, goarch: amd64, runner: macos-latest }
          - { goos: darwin, goarch: arm64, runner: macos-latest }
          - { goos: windows, goarch: amd64, runner: ubuntu-24.04 }
          - { goos: windows, goarch: arm64, runner: ubuntu-24.04 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          SUFFIX=""
          if [ "$GOOS" = "windows" ]; then
            SUFFIX=".exe"
          fi
          go build -ldflags "-X github.com/infracost/cli/version.Version=${VERSION}" -o "bin/infracost-preview${SUFFIX}" main.go

      - name: Import signing certificate
        if: matrix.goos == 'darwin'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Sign binary
        if: matrix.goos == 'darwin'
        env:
          MACOS_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" bin/infracost-preview
          codesign --verify --strict --verbose=2 bin/infracost-preview

      - name: Notarize binary
        if: matrix.goos == 'darwin'
        env:
          MACOS_NOTARIZATION_API_KEY: ${{ secrets.MACOS_NOTARIZATION_API_KEY }}
          MACOS_NOTARIZATION_API_KEY_ID: ${{ vars.MACOS_NOTARIZATION_API_KEY_ID }}
          MACOS_NOTARIZATION_API_ISSUER_ID: ${{ vars.MACOS_NOTARIZATION_API_ISSUER_ID }}
        run: |
          echo "$MACOS_NOTARIZATION_API_KEY" | base64 --decode > notary-key.p8
          ditto -c -k --keepParent bin/infracost-preview notarize.zip
          xcrun notarytool submit notarize.zip \
            --key notary-key.p8 \
            --key-id "$MACOS_NOTARIZATION_API_KEY_ID" \
            --issuer "$MACOS_NOTARIZATION_API_ISSUER_ID" \
            --wait
          rm notary-key.p8 notarize.zip

      - name: Package
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ARCHIVE="infracost-preview_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p dist
          if [ "$GOOS" = "windows" ]; then
            (cd bin && zip -r "../dist/${ARCHIVE}.zip" "infracost-preview.exe")
          else
            tar -czf "dist/${ARCHIVE}.tar.gz" -C bin infracost-preview
          fi

      - name: Upload
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: v${{ needs.version.outputs.version }}
        run: |
          gh release upload "$VERSION" ./dist/* \
            --repo "${{ github.repository }}" \
            --clobber

  publish-release:
    runs-on: ubuntu-24.04
    needs: [version, build-and-release]
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: v${{ needs.version.outputs.version }}
        run: |
          gh release edit "$VERSION" \
            --repo "${{ github.repository }}" \
            --draft=false
